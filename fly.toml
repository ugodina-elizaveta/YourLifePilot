app = "yourlifepilot"  # Измените на уникальное имя

primary_region = "ams"  # Амстердам (ближе всего к России)

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
